### Preseed file for Debian 13 (Trixie)
### See .secrets for real credentials (not committed)

#_preseed_V1

### Localization
d-i debian-installer/language string en
d-i debian-installer/country string US
d-i debian-installer/locale string en_US.UTF-8
d-i localechooser/supported-locales multiselect en_US.UTF-8

### Keyboard
d-i keyboard-configuration/xkb-keymap select us
d-i keyboard-configuration/layoutcode string us
d-i keyboard-configuration/modelcode string pc105
d-i keyboard-configuration/variantcode string
d-i keyboard-configuration/optionscode string

### Network
d-i netcfg/choose_interface select eno1
d-i netcfg/use_autoconfig boolean true
d-i netcfg/get_hostname string mother
d-i netcfg/get_domain string core
d-i netcfg/target_network_config select ifupdown

### Wi-Fi (uncomment for wireless-only hosts)
# Installer will prompt for these if not preseeded and no wired interface found.
# Requires wireless firmware to be available at installer time (e.g. firmware-iwlwifi).
#d-i netcfg/choose_interface select wlan0
#d-i netcfg/wireless_essid string MyNetwork
#d-i netcfg/wireless_security_type select wpa
#d-i netcfg/wireless_wpa string MyPassword

### Partman early command - select smallest non-USB disk for partitioning
# Runs just before the partitioner starts (disks are guaranteed visible).
# Excludes the USB installer media, then picks the smallest remaining disk.
d-i partman/early_command string \
    USBDEV=$(list-devices usb-partition | sed "s/\(.*\)./\1/" | sort -u); \
    INSTALL_DISK=""; SMALLEST=999999999999; \
    for DISK in $(list-devices disk); do \
        echo "$USBDEV" | grep -q "^${DISK}$" && continue; \
        SIZE=$(cat /sys/block/$(basename $DISK)/size); \
        if [ "$SIZE" -lt "$SMALLEST" ]; then \
            SMALLEST=$SIZE; \
            INSTALL_DISK=$DISK; \
        fi; \
    done; \
    debconf-set partman-auto/disk $INSTALL_DISK; \
    debconf-set grub-installer/bootdev $INSTALL_DISK

### Mirror
d-i apt-setup/use_mirror boolean true
d-i apt-setup/disable-cdrom-entries boolean true
d-i apt-setup/non-free-firmware boolean true
d-i mirror/country string manual
d-i mirror/http/hostname string deb.debian.org
d-i mirror/http/directory string /debian
d-i mirror/http/proxy string
choose-mirror-bin mirror/country string manual
choose-mirror-bin mirror/http/hostname string deb.debian.org
choose-mirror-bin mirror/http/directory string /debian
choose-mirror-bin mirror/http/proxy string

### Clock and timezone
d-i clock-setup/utc boolean true
d-i clock-setup/ntp boolean true
d-i clock-setup/ntp-server string pool.ntp.org
d-i time/zone string America/Denver

### Partitioning
# Auto-select the smallest non-removable disk. On mother this is the Crucial
# 275GB SSD. The "atomic" recipe creates: EFI + swap + single root.
d-i partman-auto/method string regular
d-i partman-auto/choose_recipe select atomic
d-i partman-partitioning/confirm_write_new_label boolean true
d-i partman/choose_partition select finish
# Auto-confirm partitioning (fully unattended):
d-i partman/confirm boolean true
d-i partman/confirm_nooverwrite boolean true
d-i partman-efi/non_efi_system boolean true

### Base system
d-i base-installer/kernel/image string linux-image-amd64
d-i base-installer/initramfs-tools/driver-policy string most

### Account setup
# Values substituted from .secrets at build time by inject-preseed.sh
d-i passwd/root-password-crypted password CHANGEME_ROOT_HASH
d-i passwd/root-login boolean true
d-i passwd/user-fullname string CHANGEME_FULLNAME
d-i passwd/username string CHANGEME_USERNAME
d-i passwd/user-password-crypted password CHANGEME_USER_HASH

### Package selection
tasksel tasksel/first multiselect standard
d-i pkgsel/include string openssh-server sudo curl wget git vim htop
d-i pkgsel/upgrade select full-upgrade
popularity-contest popularity-contest/participate boolean false

### GRUB bootloader
d-i grub-installer/only_debian boolean true
d-i grub-installer/force-efi-extra-removable boolean true

### Late command - post-install customization
d-i preseed/late_command string \
    in-target sed -i 's/^#PermitRootLogin .*/PermitRootLogin yes/' /etc/ssh/sshd_config ; \
    echo 'CHANGEME_USERNAME ALL=(ALL:ALL) NOPASSWD: ALL' > /target/etc/sudoers.d/CHANGEME_USERNAME ; \
    chmod 0440 /target/etc/sudoers.d/CHANGEME_USERNAME ; \
    mkdir -p /target/home/CHANGEME_USERNAME/.ssh ; \
    cp /authorized_keys /target/home/CHANGEME_USERNAME/.ssh/authorized_keys ; \
    in-target chown -R CHANGEME_USERNAME:CHANGEME_USERNAME /home/CHANGEME_USERNAME/.ssh ; \
    chmod 700 /target/home/CHANGEME_USERNAME/.ssh ; \
    chmod 600 /target/home/CHANGEME_USERNAME/.ssh/authorized_keys ; \
    mkdir -p /target/root/.ssh ; \
    cp /authorized_keys /target/root/.ssh/authorized_keys ; \
    chmod 700 /target/root/.ssh ; \
    chmod 600 /target/root/.ssh/authorized_keys ; \
    in-target sed -i 's/^GRUB_CMDLINE_LINUX=""/GRUB_CMDLINE_LINUX="ipv6.disable=1"/' /etc/default/grub ; \
    in-target sed -i 's/^GRUB_TIMEOUT=5/GRUB_TIMEOUT=0/' /etc/default/grub ; \
    echo 'GRUB_TIMEOUT_STYLE=hidden' >> /target/etc/default/grub ; \
    in-target update-grub

### Finish
d-i cdrom-detect/eject boolean true
d-i finish-install/reboot_in_progress note

